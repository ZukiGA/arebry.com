<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arebry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e8e4df;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.4rem;
  }
  .glyph {
    width: 120px; height: 120px;
    position: relative;
  }
  .links {
    display: flex;
    gap: 1.6rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .links a {
    color: #807b74;
    text-decoration: none;
    font-weight: 300;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    letter-spacing: 0.04em;
    padding: 0.3rem 0;
    border-bottom: 1px solid transparent;
    transition: color 0.3s, border-color 0.3s;
  }
  .links a:hover {
    color: #c8c2b8;
    border-bottom-color: #c8c2b830;
  }
  .dot {
    color: #3a3832;
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    user-select: none;
    align-self: center;
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="content">
  <canvas id="glyph" class="glyph" width="240" height="240"></canvas>
  <nav class="links">
    <a href="https://nemi.tech" target="_blank" rel="noopener">nemi.tech</a>
    <span class="dot">&middot;</span>
    <a href="https://postalviviente.com" target="_blank" rel="noopener">postalviviente.com</a>
  </nav>
</div>
<script>
// --- Background particles ---
(function () {
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let w, h, particles, mouse;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = canvas.width = window.innerWidth * dpr;
    h = canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    resize();
    mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const count = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 6000), 200);
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        r: Math.random() * 1.4 + 0.4,
        alpha: Math.random() * 0.35 + 0.08,
      });
    }
  }

  function draw() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    ctx.clearRect(0, 0, vw, vh);
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      const dx = mouse.x - p.x, dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 220) {
        const force = (220 - dist) / 220 * 0.003;
        p.vx += dx * force; p.vy += dy * force;
      }
      p.vx *= 0.995; p.vy *= 0.995;
      if (p.x < -10) p.x = vw + 10;
      if (p.x > vw + 10) p.x = -10;
      if (p.y < -10) p.y = vh + 10;
      if (p.y > vh + 10) p.y = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,194,184,' + p.alpha + ')';
      ctx.fill();
      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const ddx = p.x - q.x, ddy = p.y - q.y;
        const d = ddx * ddx + ddy * ddy;
        if (d < 8100) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = 'rgba(200,194,184,' + (0.06 * (1 - d / 8100)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, { passive: true });
  init(); draw();
})();

// --- Generative glyph (mini constellation) ---
(function () {
  const canvas = document.getElementById('glyph');
  const ctx = canvas.getContext('2d');
  const size = 120;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Seed from date so it changes daily
  const seed = new Date().toDateString();
  let s = 0;
  for (let i = 0; i < seed.length; i++) s = ((s << 5) - s + seed.charCodeAt(i)) | 0;
  function rng() { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 2147483647; }

  // Generate constellation nodes
  const cx = size / 2, cy = size / 2;
  const nodeCount = 5 + Math.floor(rng() * 4); // 5-8 nodes
  const nodes = [];
  for (let i = 0; i < nodeCount; i++) {
    const angle = rng() * Math.PI * 2;
    const dist = 12 + rng() * 38;
    nodes.push({
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist,
      r: 1.5 + rng() * 2.5,
      phase: rng() * Math.PI * 2,
      speed: 0.005 + rng() * 0.015,
    });
  }

  // Generate edges (connect nearby nodes)
  const edges = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      if (Math.sqrt(dx * dx + dy * dy) < 45 && rng() > 0.3) {
        edges.push([i, j]);
      }
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, size, size);

    // Draw edges
    for (const [i, j] of edges) {
      const a = nodes[i], b = nodes[j];
      const pulse = 0.12 + 0.06 * Math.sin(t * 0.001 + a.phase);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = 'rgba(200,194,184,' + pulse + ')';
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }

    // Draw nodes
    for (const n of nodes) {
      const pulse = 0.4 + 0.3 * Math.sin(t * n.speed + n.phase);
      const r = n.r * (0.85 + 0.15 * Math.sin(t * n.speed * 0.7 + n.phase));
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(224,220,212,' + pulse + ')';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
